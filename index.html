<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-a-Bot: 36 Level Challenge</title>
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --warn: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; text-align: center; background: #e0f2fe; margin: 0; padding: 10px; }
        #game-box { max-width: 600px; margin: auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stats-bar { display: flex; justify-content: space-around; margin-bottom: 10px; font-size: 1.2rem; background: #f8fafc; padding: 10px; border-radius: 10px; }
        .grid { display: grid; gap: 4px; justify-content: center; margin: 15px auto; background: #cbd5e1; padding: 8px; border-radius: 10px; width: fit-content; }
        .cell { width: 45px; height: 45px; background: white; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 4px; }
        .wall { background: #475569 !important; }
        .controls button { padding: 12px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; background: var(--primary); color: white; margin: 3px; }
        .run-btn { background: var(--success) !important; width: 100%; margin-top: 10px !important; font-weight: bold; }
        #program-queue { min-height: 50px; border: 2px dashed #94a3b8; margin: 10px 0; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 10px; }
        .star-gold { color: gold; font-size: 24px; }
        .star-gray { color: #d1d5db; font-size: 24px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; color: white; flex-direction: column; z-index: 100; }
    </style>
</head>
<body>

<div id="game-box">
    <h2 style="margin:0">🤖 Level <span id="lvl-num">1</span></h2>
    <div class="stats-bar">
        <div>⏳ <span id="timer">0</span>s</div>
        <div>⭐ <span id="stars-display"></span></div>
    </div>

    <div id="grid" class="grid"></div>
    <div id="program-queue">Queue: </div>

    <div class="controls">
        <button onclick="addCmd('⬅️')">⬅️</button>
        <button onclick="addCmd('⬆️')">⬆️</button>
        <button onclick="addCmd('⬇️')">⬇️</button>
        <button onclick="addCmd('➡️')">➡️</button>
        <button style="background:var(--danger)" onclick="resetLevel()">🔄 Reset</button>
        <button class="run-btn" onclick="execute()">🚀 RUN!</button>
    </div>
</div>

<div id="modal" class="modal">
    <h1 id="modal-title">Success!</h1>
    <div id="modal-stars" style="font-size: 50px;"></div>
    <p id="modal-msg"></p>
    <button onclick="closeModal()" style="padding:15px 30px; font-size:20px; border-radius:10px; cursor:pointer">Next Level ➡️</button>
</div>

<script>
    let currentLvl = 1;
    let robotPos = { x: 0, y: 0 };
    let goalPos = { x: 2, y: 2 };
    let walls = [];
    let program = [];
    let levelScores = {}; // Level: Stars
    let startTime, timerInterval;
    let timeLimit = 15;
    let gridSize = 4;

    function initLevel() {
        clearInterval(timerInterval);
        program = [];
        updateQueue();
        
        // Dynamic Difficulty Generator
        gridSize = Math.min(4 + Math.floor(currentLvl / 5), 8);
        timeLimit = Math.max(30 - (currentLvl * 0.5), 8);
        robotPos = { x: 0, y: 0 };
        goalPos = { x: gridSize - 1, y: gridSize - 1 };
        
        // Create Walls (Level 3+ adds walls)
        walls = [];
        if(currentLvl > 2) {
            let wallCount = Math.min(currentLvl, 15);
            for(let i=0; i<wallCount; i++){
                let wx = Math.floor(Math.random() * gridSize);
                let wy = Math.floor(Math.random() * gridSize);
                if((wx!==0||wy!==0) && (wx!==goalPos.x||wy!==goalPos.y)) walls.push(`${wx},${wy}`);
            }
        }

        renderGrid();
        startTimer();
        document.getElementById('lvl-num').innerText = currentLvl;
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${gridSize}, 45px)`;
        grid.innerHTML = '';
        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (walls.includes(`${x},${y}`)) cell.classList.add('wall');
                if (x === robotPos.x && y === robotPos.y) cell.innerText = '🤖';
                else if (x === goalPos.x && y === goalPos.y) cell.innerText = '⭐';
                grid.appendChild(cell);
            }
        }
    }

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = elapsed;
            if(elapsed > timeLimit * 2) { // Auto fail if they take way too long
                clearInterval(timerInterval);
                alert("Time's Up! Be faster!");
                resetLevel();
            }
        }, 1000);
    }

    function addCmd(c) { program.push(c); updateQueue(); }
    function updateQueue() { document.getElementById('program-queue').innerText = program.join(' '); }
    function resetLevel() { initLevel(); }

    async function execute() {
        clearInterval(timerInterval);
        let timeTaken = (Date.now() - startTime) / 1000;

        for (let cmd of program) {
            let oldPos = {...robotPos};
            if (cmd === '⬅️') robotPos.x--;
            if (cmd === '➡️') robotPos.x++;
            if (cmd === '⬆️') robotPos.y--;
            if (cmd === '⬇️') robotPos.y++;

            // Collision Check
            if (robotPos.x < 0 || robotPos.x >= gridSize || robotPos.y < 0 || robotPos.y >= gridSize || walls.includes(`${robotPos.x},${robotPos.y}`)) {
                robotPos = {...oldPos}; // Stop at walls/edge
            }
            renderGrid();
            await new Promise(r => setTimeout(r, 300));

            if (robotPos.x === goalPos.x && robotPos.y === goalPos.y) {
                calculateStars(timeTaken);
                return;
            }
        }
        alert("Oh no! The robot didn't reach the star. Try again!");
        resetLevel();
    }

    function calculateStars(time) {
        let stars = 1;
        if (time <= timeLimit) stars = 3;
        else if (time <= timeLimit * 1.2) stars = 2;
        
        levelScores[currentLvl] = stars;
        showWin(stars);
    }

    function checkLocks() {
        let prevLevels = currentLvl;
        let threeStarCount = Object.values(levelScores).filter(s => s === 3).length;

        if (currentLvl === 9) { // Check for Level 10
            if (threeStarCount < 6) return "You need 3 stars in 6 levels to unlock Level 10!";
        }
        if (currentLvl === 19) { // Check for Level 20
            if (threeStarCount < 12) return "You need 3 stars in 12 levels to unlock Level 20!";
        }
        if (currentLvl === 29) { // Check for Level 30
             if (threeStarCount < 24) return "You need 3 stars in 24 levels to unlock Level 30!";
        }
        if (currentLvl === 35) { // Check for Final Level
            if (threeStarCount < 35) return "Perfect 3-star score in ALL levels required for the Final Challenge!";
        }
        return null;
    }

    function showWin(stars) {
        const modal = document.getElementById('modal');
        const starBox = document.getElementById('modal-stars');
        starBox.innerHTML = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
        
        let lockMsg = checkLocks();
        if(lockMsg) {
            document.getElementById('modal-title').innerText = "Locked!";
            document.getElementById('modal-msg').innerText = lockMsg;
            // User stays on current level until they re-try for better stars
        } else {
            document.getElementById('modal-title').innerText = "Awesome!";
            document.getElementById('modal-msg').innerText = `You finished in ${Math.floor(timeTaken)} seconds!`;
            currentLvl++;
        }
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        initLevel();
    }

    initLevel();
</script>
</body>
</html>
