<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code-a-Bot: The 36 Quest</title>
    <style>
        :root { 
            --primary: #6366f1; --success: #22c55e; --warn: #eab308; --danger: #ef4444; --bg: #f8fafc;
            --btn-up: linear-gradient(135deg, #60a5fa, #3b82f6);
            --btn-down: linear-gradient(135deg, #fb923c, #f97316);
            --btn-left: linear-gradient(135deg, #a78bfa, #8b5cf6);
            --btn-right: linear-gradient(135deg, #f472b6, #ec4899);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; overflow-x: hidden; }
        #main-container { display: flex; gap: 20px; max-width: 1100px; width: 100%; }
        
        #game-box { flex: 2; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; position: relative; border: 1px solid #e2e8f0; }
        #sidebar { flex: 1; background: #fff; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-height: 90vh; overflow-y: auto; border: 1px solid #e2e8f0; }
        
        .lvl-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .lvl-btn { aspect-ratio: 1; border: none; border-radius: 12px; font-weight: bold; background: #f1f5f9; color: #cbd5e1; font-size: 16px; transition: 0.3s; }
        .lvl-btn.unlocked { background: #dbeafe; color: #1e40af; cursor: pointer; }
        .lvl-btn.completed-3 { background: #dcfce7; color: #166534; cursor: pointer; }
        .lvl-btn.active { box-shadow: 0 0 0 4px #6366f1; transform: scale(1.05); }

        .grid { display: grid; gap: 6px; justify-content: center; margin: 20px auto; background: #f1f5f9; padding: 12px; border-radius: 16px; width: fit-content; position: relative; }
        .cell { width: 50px; height: 50px; background: white; display: flex; align-items: center; justify-content: center; font-size: 32px; border-radius: 8px; transition: 0.3s; }
        .wall { background: #475569 !important; transform: scale(0.9); border-radius: 10px; }
        .hint-path { background: #fef9c3 !important; border: 2px dashed #eab308; }

        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .cmd-btn { border: none; border-radius: 16px; padding: 15px 5px; color: white; cursor: pointer; font-size: 28px; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .cmd-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        
        .up { background: var(--btn-up); } .down { background: var(--btn-down); }
        .left { background: var(--btn-left); } .right { background: var(--btn-right); }
        
        .action-btns { grid-column: span 4; display: flex; gap: 10px; margin-top: 5px; }
        .run-btn { flex: 2; background: var(--success); color: white; padding: 15px; border-radius: 16px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 0 #15803d; }

        #program-queue { min-height: 65px; border: 3px dashed #e2e8f0; margin: 15px 0; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; background: #fafafa; gap: 8px; padding: 5px; }
        .q-item { transition: 0.3s; padding: 5px; border-radius: 8px; }
        .q-active { background: #fef08a; transform: scale(1.3); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        #toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 40px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 1000; }
        #toast.show { opacity: 1; top: 40px; }
        
        .shop-box { margin-top: 20px; padding: 15px; background: #f1f5f9; border-radius: 16px; text-align: left; }
        .skin-btn { font-size: 24px; padding: 10px; border: 2px solid #cbd5e1; border-radius: 12px; background: white; cursor: pointer; margin-right: 5px; }
        .skin-locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s ease-in-out 2; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); display: none; align-items: center; justify-content: center; color: white; flex-direction: column; z-index: 2000; text-align: center; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="game-box">
        <div id="toast">Message</div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 style="margin:0; color: #475569;">Level <span id="lvl-num">1</span></h2>
                <div style="font-size: 14px; color: #64748b;">Total Stars: <span id="total-stars-display">0</span> ⭐</div>
            </div>
            <div style="font-size: 24px; font-weight: bold; background: #f1f5f9; padding: 5px 15px; border-radius: 12px;">⏳ <span id="timer">0</span>s</div>
            <div id="star-rating" style="font-size: 30px;"></div>
        </div>

        <div id="grid" class="grid"></div>
        <div id="program-queue"></div>

        <div class="controls">
            <button class="cmd-btn left" onclick="addCmd('left')">⬅️</button>
            <button class="cmd-btn up" onclick="addCmd('up')">⬆️</button>
            <button class="cmd-btn down" onclick="addCmd('down')">⬇️</button>
            <button class="cmd-btn right" onclick="addCmd('right')">➡️</button>
            <div class="action-btns">
                <button class="clear-btn" style="background:#94a3b8; color:white; border-radius:16px; border:none; padding:15px; font-weight:bold; cursor:pointer;" onclick="resetLevel()">❌ Clear</button>
                <button id="hint-btn" style="background:#fef9c3; border:2px solid #eab308; border-radius:16px; padding:10px; display:none;" onclick="showHint()">💡 Hint</button>
                <button class="run-btn" onclick="execute()">🚀 RUN PROGRAM</button>
            </div>
        </div>

        <div class="shop-box">
            <strong style="font-size: 14px; display: block; margin-bottom: 8px;">Character Shop:</strong>
            <button class="skin-btn" onclick="changeSkin('🤖', 0)">🤖</button>
            <button id="skin-cat" class="skin-btn skin-locked" onclick="changeSkin('🐱', 10)">🐱 (10⭐)</button>
            <button id="skin-dog" class="skin-btn skin-locked" onclick="changeSkin('🐶', 25)">🐶 (25⭐)</button>
            <button id="skin-alien" class="skin-btn skin-locked" onclick="changeSkin('👾', 50)">👾 (50⭐)</button>
        </div>
    </div>

    <div id="sidebar">
        <h3 style="margin-top:0; color: #1e293b;">Level Map</h3>
        <div class="lvl-grid" id="sidebar-grid"></div>
        <button onclick="clearSave()" style="margin-top:20px; font-size:10px; opacity:0.5; border:none; background:none; cursor:pointer;">Reset All Progress</button>
    </div>
</div>

<div id="modal" class="modal">
    <h1 id="modal-title">Excellent!</h1>
    <div id="modal-stars"></div>
    <p id="modal-msg"></p>
    <button onclick="closeModal()" style="padding:18px 60px; font-size:24px; border-radius:20px; cursor:pointer; background: var(--success); color: white; border: none; font-weight: bold;">Next Level</button>
</div>

<script>
    let currentLvl = 1, maxUnlocked = 1, robotPos = {x:0,y:0}, goalPos = {x:0,y:0}, walls = [], program = [], levelScores = {}, timerInterval, timeRemaining, initialTimeLimit, gridSize, currentSkin = '🤖', failCount = 0;

    const icons = { up: '⬆️', down: '⬇️', left: '⬅️', right: '➡️', goal: '🎁' };

    // --- PROGRESS SAVING ---
    function saveProgress() {
        localStorage.setItem('codeBot_maxUnlocked', maxUnlocked);
        localStorage.setItem('codeBot_scores', JSON.stringify(levelScores));
        localStorage.setItem('codeBot_skin', currentSkin);
    }

    function loadProgress() {
        maxUnlocked = parseInt(localStorage.getItem('codeBot_maxUnlocked')) || 1;
        levelScores = JSON.parse(localStorage.getItem('codeBot_scores')) || {};
        currentSkin = localStorage.getItem('codeBot_skin') || '🤖';
        updateTotalStars();
    }

    function clearSave() { if(confirm("Start from Level 1 again?")) { localStorage.clear(); location.reload(); } }

    function updateTotalStars() {
        const total = Object.values(levelScores).reduce((a, b) => a + b, 0);
        document.getElementById('total-stars-display').innerText = total;
        if(total >= 10) document.getElementById('skin-cat').classList.remove('skin-locked');
        if(total >= 25) document.getElementById('skin-dog').classList.remove('skin-locked');
        if(total >= 50) document.getElementById('skin-alien').classList.remove('skin-locked');
    }

    function changeSkin(skin, cost) {
        const total = Object.values(levelScores).reduce((a, b) => a + b, 0);
        if(total >= cost) { currentSkin = skin; saveProgress(); renderGrid(); showToast("Skin Equipped!"); }
    }

    // --- GAME LOGIC ---
    function initLevel(lvl) {
        currentLvl = lvl; clearInterval(timerInterval); program = []; updateQueue(); failCount = 0;
        document.getElementById('hint-btn').style.display = 'none';
        gridSize = Math.min(4 + Math.floor(currentLvl / 6), 8);
        initialTimeLimit = Math.max(25 - (currentLvl * 0.5), 8);
        timeRemaining = initialTimeLimit;
        robotPos = { x: 0, y: 0 }; goalPos = { x: gridSize - 1, y: gridSize - 1 };
        generateValidMap(); renderGrid(); renderSidebar(); startTimer(); updateStarUI(3);
        document.getElementById('lvl-num').innerText = currentLvl;
        document.getElementById('modal').style.display = 'none';
        updateTotalStars();
    }

    function generateValidMap() {
        let attempts = 0, valid = false;
        while (!valid && attempts < 100) {
            walls = [];
            let density = Math.min(0.05 + (currentLvl * 0.015), 0.35); 
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    if ((x===0 && y===0) || (x===goalPos.x && y===goalPos.y)) continue;
                    if (Math.random() < density) walls.push(`${x},${y}`);
                }
            }
            valid = checkPathExists().length > 0;
            attempts++;
        }
    }

    function checkPathExists() {
        let q = [[{x:0, y:0}]], visited = new Set(['0,0']);
        while(q.length > 0) {
            let path = q.shift(), c = path[path.length-1];
            if(c.x === goalPos.x && c.y === goalPos.y) return path;
            for(let d of [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]) {
                let nx=c.x+d.x, ny=c.y+d.y, k=`${nx},${ny}`;
                if(nx>=0 && nx<gridSize && ny>=0 && ny<gridSize && !walls.includes(k) && !visited.has(k)) {
                    visited.add(k); q.push([...path, {x:nx, y:ny}]);
                }
            }
        }
        return [];
    }

    function showHint() {
        const path = checkPathExists();
        path.forEach((p, i) => {
            setTimeout(() => {
                const cell = document.getElementById(`cell-${p.x}-${p.y}`);
                if(cell) cell.classList.add('hint-path');
            }, i * 100);
        });
        setTimeout(() => renderGrid(), 3000);
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeRemaining--;
            document.getElementById('timer').innerText = Math.max(Math.ceil(timeRemaining), 0);
            updateStarUI(timeRemaining > 0 ? 3 : (timeRemaining > -5 ? 2 : 1));
            if (timeRemaining < -15) { clearInterval(timerInterval); showToast("Battery Dead!"); initLevel(currentLvl); }
        }, 1000);
    }

    async function execute() {
        if (program.length === 0) return;
        clearInterval(timerInterval);
        const queueDivs = document.querySelectorAll('.q-item');
        
        for (let i = 0; i < program.length; i++) {
            queueDivs.forEach(d => d.classList.remove('q-active'));
            queueDivs[i].classList.add('q-active');
            
            let cmd = program[i], n = {...robotPos};
            if(cmd==='left') n.x--; if(cmd==='right') n.x++; if(cmd==='up') n.y--; if(cmd==='down') n.y++;
            
            if(n.x>=0 && n.x<gridSize && n.y>=0 && n.y<gridSize && !walls.includes(`${n.x},${n.y}`)) {
                robotPos = n;
            } else {
                document.getElementById('game-box').classList.add('shake');
                showToast("BUMP!");
                setTimeout(() => document.getElementById('game-box').classList.remove('shake'), 400);
            }
            renderGrid();
            await new Promise(r => setTimeout(r, 400));
            if(robotPos.x===goalPos.x && robotPos.y===goalPos.y) return winLevel();
        }
        failCount++;
        if(failCount >= 2) document.getElementById('hint-btn').style.display = 'inline-block';
        showToast("Missed!");
        setTimeout(() => initLevel(currentLvl), 1000);
    }

    function winLevel() {
        let s = timeRemaining > 0 ? 3 : (timeRemaining > -5 ? 2 : 1);
        levelScores[currentLvl] = Math.max(s, levelScores[currentLvl] || 0);
        if (currentLvl === maxUnlocked && currentLvl < 36 && !checkGate(currentLvl + 1)) maxUnlocked++;
        saveProgress();
        showModal("Victory!", s, "Great coding!");
    }

    function checkGate(target) {
        const threeS = Object.values(levelScores).filter(s => s === 3).length;
        if (target === 10 && threeS < 6) return "Need 6 perfect levels!";
        return null;
    }

    function renderGrid() {
        const g = document.getElementById('grid'); g.style.gridTemplateColumns = `repeat(${gridSize}, 50px)`;
        g.innerHTML = '';
        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                const c = document.createElement('div'); c.className = 'cell' + (walls.includes(`${x},${y}`) ? ' wall' : '');
                c.id = `cell-${x}-${y}`;
                if (x === robotPos.x && y === robotPos.y) c.innerHTML = currentSkin;
                else if (x === goalPos.x && y === goalPos.y) c.innerHTML = icons.goal;
                g.appendChild(c);
            }
        }
    }

    function renderSidebar() {
        const sg = document.getElementById('sidebar-grid'); sg.innerHTML = '';
        for (let i=1; i<=36; i++) {
            const b = document.createElement('button'); b.className = 'lvl-btn'; b.innerText = i;
            if(i <= maxUnlocked) {
                b.classList.add('unlocked'); b.onclick = () => initLevel(i);
                if(levelScores[i]===3) b.classList.add('completed-3');
            } else b.innerText = '🔒';
            if(i === currentLvl) b.classList.add('active');
            sg.appendChild(b);
        }
    }

    function updateQueue() {
        const q = document.getElementById('program-queue');
        q.innerHTML = program.map(c => `<div class="q-item">${icons[c]}</div>`).join('');
    }

    function showModal(t, s, m) {
        document.getElementById('modal-stars').innerHTML = '⭐'.repeat(s);
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { initLevel(currentLvl < maxUnlocked ? currentLvl + 1 : currentLvl); }
    function addCmd(c) { if(program.length < 20) { program.push(c); updateQueue(); } }
    function resetLevel() { program = []; updateQueue(); }
    function updateStarUI(c) { document.getElementById('star-rating').innerHTML = '⭐'.repeat(c); }
    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

    loadProgress();
    initLevel(currentLvl);
</script>
</body>
</html>
